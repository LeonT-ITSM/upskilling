services:
  app:
    build:
      context: .
      dockerfile: Dockerfile.prod
    working_dir: /workspace
    restart: unless-stopped
    env_file: .env
    ports:
      - "${HOST_PORT:-3000}:${PORT:-3000}"
    depends_on:
      - mongo

  mongo:
    image: mongo:7
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_ROOT_USER:-}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASSWORD:-}
    volumes:
      - mongo-data:/data/db

volumes:
  mongo-data:
