name: SAST - Semgrep
on:
  workflow_dispatch:
  pull_request:
  push:
    branches: [master]

permissions:
  contents: read

jobs:
  semgrep:
    runs-on: ubuntu-latest
    container:
      image: semgrep/semgrep
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 #v7.0.0
      - run: >-
          semgrep scan --config auto --error
